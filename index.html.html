<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>臻评 · 商家好评 & Wi-Fi</title>
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 二维码生成库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- 腾讯云开发 SDK -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        :root {
            --bg-color: #f0f3f8;
            --card-bg: rgba(255, 255, 255, 0.65);
            --text-primary: #1a2638;
            --text-secondary: #3a4a5c;
            --border-light: rgba(255, 255, 255, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.06);
            --btn-bg: rgba(255, 255, 255, 0.75);
            --btn-hover: rgba(255, 255, 255, 0.95);
            --warning-bg: rgba(255, 235, 200, 0.7);
            --guide-bg: rgba(255, 255, 255, 0.8);
            --guide-border: rgba(0, 0, 0, 0.15);
            --guide-btn-bg: #2d3e50;
            --guide-btn-text: #ffffff;
            --error-bg: rgba(255, 110, 110, 0.25);
            --wifi-bg: rgba(235, 250, 255, 0.7);
            --highlight: #0a7cff;
            --wechat-green: #07c160;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: rgba(35, 35, 40, 0.7);
                --text-primary: #f0f0f0;
                --text-secondary: #ccc;
                --border-light: rgba(255, 255, 255, 0.08);
                --shadow-color: rgba(0, 0, 0, 0.4);
                --btn-bg: rgba(55, 55, 60, 0.7);
                --btn-hover: rgba(75, 75, 80, 0.9);
                --warning-bg: rgba(80, 60, 30, 0.7);
                --guide-bg: rgba(40, 40, 45, 0.8);
                --guide-border: rgba(255, 255, 255, 0.15);
                --guide-btn-bg: #ccc;
                --guide-btn-text: #121212;
                --error-bg: rgba(180, 60, 60, 0.4);
                --wifi-bg: rgba(20, 40, 60, 0.6);
            }
        }

        body {
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 14px;
            transition: background 0.3s;
        }

        .glass-container {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 44px 44px 32px 32px;
            padding: 24px 18px 18px;
            box-shadow: 0 20px 40px var(--shadow-color), 0 0 0 1px var(--border-light) inset;
            border: 1px solid var(--border-light);
        }

        /* 商家头部 */
        .shop-header {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 24px 18px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border-light);
            box-shadow: 0 8px 22px var(--shadow-color);
        }

        .shop-name {
            font-size: 1.7rem;
            font-weight: 650;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        /* 微信联系区 */
        .wechat-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 14px 0 8px;
            cursor: pointer;
            user-select: none;
        }

        .wechat-icon {
            font-size: 1.3rem;
            color: var(--wechat-green);
        }

        .wechat-number {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--card-bg);
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }

        .copy-wechat-hint {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Wi-Fi 卡片 */
        .wifi-section {
            background: var(--wifi-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 18px var(--shadow-color);
            transition: transform 0.2s;
        }

        .wifi-section:active {
            transform: scale(0.985);
        }

        .wifi-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .wifi-icon-circle {
            background: var(--highlight);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .wifi-ssid {
            font-weight: 600;
            font-size: 1.15rem;
            color: var(--text-primary);
        }

        .wifi-password {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .wifi-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }

        .wifi-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-primary);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            box-shadow: 0 4px 8px var(--shadow-color);
            transition: all 0.15s;
        }

        .wifi-btn:active {
            transform: scale(0.94);
            background: var(--btn-hover);
        }

        /* 好评数量与列表 */
        .review-count-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 0 6px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .count-badge {
            background: var(--highlight);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 22px;
            min-height: 100px;
        }

        .review-card {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            border-radius: 26px;
            padding: 16px 18px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 14px var(--shadow-color);
            animation: cardPop 0.3s ease;
        }

        @keyframes cardPop {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .review-text {
            font-size: 1.02rem;
            line-height: 1.4;
            color: var(--text-primary);
            word-break: break-word;
            flex: 1;
            padding-right: 12px;
        }

        .copy-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-secondary);
            backdrop-filter: blur(4px);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        .copy-btn:active {
            transform: scale(0.93);
            background: var(--btn-hover);
        }

        .copy-btn::after {
            content: "📋";
            font-size: 1.1rem;
        }

        .browser-tip {
            background: var(--warning-bg);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 16px;
            margin: 10px 0 14px;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        /* 弹窗通用 */
        .modal-overlay,
        .wechat-guide-overlay,
        .manual-copy-overlay,
        .wifi-qr-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .modal-overlay.show,
        .wechat-guide-overlay.show,
        .manual-copy-overlay.show,
        .wifi-qr-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-glass,
        .wifi-qr-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            border-radius: 48px;
            padding: 32px 24px;
            width: 320px;
            border: 1px solid var(--border-light);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
        }

        .modal-overlay.show .modal-glass,
        .wifi-qr-overlay.show .wifi-qr-card {
            transform: scale(1);
        }

        .qr-canvas {
            margin: 20px auto;
            display: flex;
            justify-content: center;
        }

        .wifi-qr-card .wifi-btn-link {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 12px 22px;
            margin-top: 18px;
            display: inline-block;
            color: var(--text-primary);
            font-weight: 550;
            cursor: pointer;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 2000;
            backdrop-filter: blur(12px);
            display: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <!-- Toast 提示 -->
    <div class="toast-message" id="toastMessage"></div>

    <!-- 微信内引导遮罩 -->
    <div class="wechat-guide-overlay" id="wechatGuideOverlay">
        <div class="modal-glass">
            <div style="font-size: 2.8rem; margin-bottom: 16px;">↗️</div>
            <div style="font-size:2rem; font-weight:600; margin-bottom:16px;">微信内无法打开</div>
            <div style="background:var(--btn-bg); border-radius:30px; padding:12px; margin:18px 0;">点击右上角「···」</div>
            <div style="margin-bottom:24px;">选择「在浏览器打开」即可正常跳转APP</div>
            <button id="guideConfirmBtn" style="background:var(--guide-btn-bg); border:none; border-radius:40px; padding:14px 24px; color:var(--guide-btn-text); width:100%; font-size:1rem; cursor:pointer;">我知道了</button>
        </div>
    </div>

    <!-- 手动复制备用 -->
    <div class="manual-copy-overlay" id="manualCopyOverlay">
        <div class="modal-glass">
            <div style="font-size:1.3rem; font-weight:600;">📋 复制失败</div>
            <div style="margin:12px 0;">请长按下方文字手动复制</div>
            <div id="manualCopyText" style="background:var(--btn-bg); border-radius:20px; padding:16px; margin:16px 0; word-break:break-word; text-align:left; user-select:text;"></div>
            <button id="manualCopyCloseBtn" style="background:var(--guide-btn-bg); border:none; border-radius:40px; padding:12px 24px; color:var(--guide-btn-text); cursor:pointer;">关闭</button>
        </div>
    </div>

    <!-- Wi-Fi 二维码弹窗 -->
    <div class="wifi-qr-overlay" id="wifiQrOverlay">
        <div class="wifi-qr-card">
            <div style="font-size:1.5rem; font-weight:600; margin-bottom:6px;">📶 扫码连 Wi-Fi</div>
            <div style="color:var(--text-secondary); margin-bottom:10px;" id="wifiQrSsid"></div>
            <div class="qr-canvas" id="wifiQrCanvas"></div>
            <div class="wifi-btn-link" id="closeWifiQrBtn">关闭</div>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="glass-container">
        <!-- 商家信息 -->
        <div id="shopHeader" class="shop-header">
            <div class="shop-name">❤️ 臻选商家</div>
            <div class="wechat-area" id="wechatArea">
                <i class="fab fa-weixin wechat-icon"></i>
                <span class="wechat-number" id="wechatNumber">加载中...</span>
            </div>
            <div class="copy-wechat-hint">点击复制微信号，快速添加店长</div>
        </div>

        <!-- Wi-Fi 区域（JS动态渲染） -->
        <div id="wifiContainer"></div>

        <!-- 好评剩余数量 -->
        <div class="review-count-bar" id="reviewCountBar" style="display: none;">
            <span>📝 精选好评</span>
            <span class="count-badge" id="reviewCountBadge">0条</span>
        </div>

        <!-- 好评列表 -->
        <div id="reviewsContainer" class="reviews-list">
            <div class="review-card" style="justify-content:center;">⏳ 加载中...</div>
        </div>

        <div class="browser-tip">✨ 点击复制 → 选择平台 → 自动跳转对应APP</div>
    </div>

    <!-- 平台选择弹窗 -->
    <div class="modal-overlay" id="appChoiceModal">
        <div class="modal-glass">
            <div style="font-size:1.5rem; font-weight:600; margin-bottom:24px;">选择跳转平台</div>
            <div id="chooseDouyin" class="wifi-btn" style="margin-bottom:14px; justify-content:center;">
                <i class="fab fa-tiktok"></i> 抖音
            </div>
            <div id="chooseMeituan" class="wifi-btn" style="margin-bottom:14px; justify-content:center;">
                <i class="fas fa-store"></i> 美团
            </div>
            <div id="closeModal" class="wifi-btn" style="background:transparent; justify-content:center;">取消</div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 配置区 ====================
            const CLOUD_ENV = 'zp111-6gl1npyo592dd6e5';   // 你的云环境ID
            const REVIEWS_COLLECTION = 'reviews';         // 好评集合名
            const urlParams = new URLSearchParams(window.location.search);
            const shopId = urlParams.get('shopId') || 'billiard_001'; // 默认店铺

            // ==================== 全局变量 ====================
            let cloudApp = null;
            let isCloudReady = false;
            let currentReviews = [];       // 当前好评数组
            let selectedReviewId = null;   // 选中要复制的好评ID
            let currentWifi = { ssid: '', password: '' };

            // 设备/环境检测
            const ua = navigator.userAgent.toLowerCase();
            const isWeChat = /micromessenger/.test(ua);
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isAndroid = /android/.test(ua);
            const isMiBrowser = ua.includes('miui') || ua.includes('xiaomi');

            // ==================== DOM 元素 ====================
            const reviewsContainer = document.getElementById('reviewsContainer');
            const modalOverlay = document.getElementById('appChoiceModal');
            const chooseDouyin = document.getElementById('chooseDouyin');
            const chooseMeituan = document.getElementById('chooseMeituan');
            const closeModalBtn = document.getElementById('closeModal');
            const toastMessage = document.getElementById('toastMessage');
            const guideOverlay = document.getElementById('wechatGuideOverlay');
            const manualCopyOverlay = document.getElementById('manualCopyOverlay');
            const manualCopyText = document.getElementById('manualCopyText');
            const manualCopyCloseBtn = document.getElementById('manualCopyCloseBtn');
            const wechatNumberSpan = document.getElementById('wechatNumber');
            const shopNameDiv = document.querySelector('.shop-name');
            const reviewCountBar = document.getElementById('reviewCountBar');
            const reviewCountBadge = document.getElementById('reviewCountBadge');
            const wifiContainer = document.getElementById('wifiContainer');
            const wifiQrOverlay = document.getElementById('wifiQrOverlay');
            const wifiQrCanvas = document.getElementById('wifiQrCanvas');
            const wifiQrSsid = document.getElementById('wifiQrSsid');
            const closeWifiQrBtn = document.getElementById('closeWifiQrBtn');

            // ==================== 工具函数 ====================
            function showToast(msg, duration = 2500) {
                toastMessage.style.display = 'block';
                toastMessage.textContent = msg;
                setTimeout(() => { toastMessage.style.display = 'none'; }, duration);
            }

            function escapeHtml(str) {
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
            }

            // ==================== 云开发初始化 ====================
            async function initCloud() {
                try {
                    cloudApp = cloudbase.init({ env: CLOUD_ENV });
                    await cloudApp.auth().signInAnonymously();
                    isCloudReady = true;
                    console.log('云开发就绪');
                } catch (e) {
                    console.error('云开发失败', e);
                    isCloudReady = false;
                }
            }

            // ==================== 获取商家信息 ====================
            async function loadShopInfo() {
                if (!isCloudReady) return;
                try {
                    const res = await cloudApp.callFunction({
                        name: 'getMerchantInfo',
                        data: { shopId }
                    });
                    if (res.result && res.result.code === 0) {
                        const data = res.result.data;
                        shopNameDiv.innerText = data.shopName || '臻选商家';
                        wechatNumberSpan.innerText = data.wechat || '暂无微信号';
                    } else {
                        wechatNumberSpan.innerText = '未配置';
                    }
                } catch (e) {
                    wechatNumberSpan.innerText = '加载失败';
                }
            }

            // ==================== 获取 Wi-Fi 信息（集合名：wifiConfig） ====================
            async function loadWifiInfo() {
                if (!isCloudReady) return;
                try {
                    const res = await cloudApp.callFunction({
                        name: 'getWifiInfo',   // 你已部署好的云函数
                        data: { shopId }
                    });
                    if (res.result && res.result.code === 0 && res.result.data) {
                        currentWifi = {
                            ssid: res.result.data.ssid || '',
                            password: res.result.data.password || ''
                        };
                    } else {
                        currentWifi = { ssid: '', password: '' };
                    }
                } catch (e) {
                    currentWifi = { ssid: '', password: '' };
                }
                renderWifiSection();
            }

            // 渲染 Wi-Fi 卡片
            function renderWifiSection() {
                if (!currentWifi.ssid) {
                    wifiContainer.innerHTML = '';
                    return;
                }
                const html = `
                    <div class="wifi-section">
                        <div class="wifi-info">
                            <div class="wifi-icon-circle"><i class="fas fa-wifi"></i></div>
                            <div>
                                <div class="wifi-ssid">${escapeHtml(currentWifi.ssid)}</div>
                                <div class="wifi-password">密码：${escapeHtml(currentWifi.password || '无密码')}</div>
                            </div>
                        </div>
                        <div class="wifi-actions">
                            <button class="wifi-btn" id="connectWifiBtn"><i class="fas fa-plug"></i> 一键连</button>
                            <button class="wifi-btn" id="showQrBtn"><i class="fas fa-qrcode"></i> 扫码连</button>
                        </div>
                    </div>
                `;
                wifiContainer.innerHTML = html;
                document.getElementById('connectWifiBtn')?.addEventListener('click', handleConnectWifi);
                document.getElementById('showQrBtn')?.addEventListener('click', showWifiQrCode);
            }

            // 一键连 Wi-Fi（复制密码 + 尝试打开系统设置）
            function handleConnectWifi() {
                if (currentWifi.password && navigator.clipboard) {
                    navigator.clipboard.writeText(currentWifi.password).catch(() => {});
                }
                if (isIOS) {
                    showToast('请手动打开“设置”>“无线局域网”连接', 3000);
                } else if (isAndroid) {
                    const intentUrl = 'intent://#Intent;action=android.settings.WIFI_SETTINGS;end;';
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = intentUrl;
                    document.body.appendChild(iframe);
                    setTimeout(() => iframe.remove(), 400);
                }
                showToast(`Wi-Fi “${currentWifi.ssid}” 密码已复制，请手动连接`, 3500);
            }

            // 显示 Wi-Fi 二维码
            function showWifiQrCode() {
                wifiQrSsid.textContent = currentWifi.ssid;
                wifiQrCanvas.innerHTML = '';
                const wifiString = `WIFI:T:WPA;S:${currentWifi.ssid};P:${currentWifi.password};;`;
                new QRCode(wifiQrCanvas, {
                    text: wifiString,
                    width: 200,
                    height: 200,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
                wifiQrOverlay.classList.add('show');
            }

            closeWifiQrBtn.addEventListener('click', () => wifiQrOverlay.classList.remove('show'));
            wifiQrOverlay.addEventListener('click', (e) => {
                if (e.target === wifiQrOverlay) wifiQrOverlay.classList.remove('show');
            });

            // ==================== 好评加载与渲染 ====================
            async function loadReviews() {
                if (!isCloudReady) return [];
                try {
                    const db = cloudApp.database();
                    const res = await db.collection(REVIEWS_COLLECTION)
                        .where({ shopId: shopId })
                        .orderBy('createTime', 'desc')
                        .get();
                    return res.data.map(doc => ({ id: doc._id, text: doc.text }));
                } catch (e) {
                    return [];
                }
            }

            function renderReviews(reviews) {
                if (!reviews.length) {
                    reviewsContainer.innerHTML = '<div class="review-card" style="justify-content:center;">✨ 暂无好评，请联系管理员购买</div>';
                    reviewCountBar.style.display = 'none';
                    return;
                }
                reviewCountBar.style.display = 'flex';
                // 打乱并最多显示5条
                let shuffled = [...reviews];
                if (shuffled.length > 5) {
                    for (let i = shuffled.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                    }
                    shuffled = shuffled.slice(0, 5);
                }
                let html = '';
                shuffled.forEach(item => {
                    html += `<div class="review-card"><span class="review-text">${escapeHtml(item.text)}</span><button class="copy-btn" data-id="${item.id}">复制</button></div>`;
                });
                reviewsContainer.innerHTML = html;
                reviewCountBadge.textContent = reviews.length + '条';
            }

            // ==================== 删除好评（云函数） ====================
            async function deleteReviewById(id) {
                if (!isCloudReady) return false;
                try {
                    const res = await cloudApp.callFunction({
                        name: 'deleteReview',
                        data: { reviewId: id }
                    });
                    return res.result.code === 0;
                } catch (e) {
                    return false;
                }
            }

            // ==================== 复制文本功能 ====================
            function copyTextToClipboard(text, callback) {
                if (isMiBrowser) {
                    // 小米浏览器特殊处理
                    const div = document.createElement('div');
                    div.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:5000;';
                    div.innerHTML = `<div style="background:white;border-radius:32px;padding:28px;max-width:340px;">
                        <div style="font-size:1.5rem;font-weight:600;">📋 复制文案</div>
                        <div style="margin:12px 0;">请长按下方文字手动复制</div>
                        <div style="background:#f5f5f5;border-radius:16px;padding:20px;margin:16px 0;word-break:break-word;user-select:text;">${text}</div>
                        <button id="miCopyNext" style="background:#2196F3;border:none;border-radius:60px;padding:14px;color:white;width:100%;font-size:1rem;">我已复制，下一步</button>
                    </div>`;
                    document.body.appendChild(div);
                    document.getElementById('miCopyNext').addEventListener('click', () => {
                        div.remove();
                        callback(true);
                    });
                } else {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(text).then(() => callback(true)).catch(() => fallbackCopy(text, callback));
                    } else {
                        fallbackCopy(text, callback);
                    }
                }
            }

            function fallbackCopy(text, callback) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    if (success) { callback(true); return; }
                } catch (e) {}
                document.body.removeChild(textarea);
                // 最后备用：显示手动复制弹窗
                manualCopyText.textContent = text;
                manualCopyOverlay.classList.add('show');
                callback(false);
            }

            manualCopyCloseBtn.addEventListener('click', () => manualCopyOverlay.classList.remove('show'));

            // ==================== 微信区域点击 ====================
            document.getElementById('wechatArea').addEventListener('click', () => {
                const wechat = wechatNumberSpan.innerText;
                if (wechat && wechat !== '暂无微信号' && wechat !== '未配置') {
                    navigator.clipboard.writeText(wechat).catch(() => {});
                    const scheme = 'weixin://';
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = scheme;
                    document.body.appendChild(iframe);
                    setTimeout(() => iframe.remove(), 400);
                    showToast(`已复制微信号 ${wechat}，正在尝试打开微信`, 3000);
                } else {
                    showToast('店长微信号未配置', 2000);
                }
            });

            // ==================== APP 跳转逻辑 ====================
            function jumpToApp(platform) {
                const config = {
                    douyin: {
                        universal: 'https://www.douyin.com',
                        intent: 'intent://#Intent;scheme=snssdk1128;package=com.ss.android.ugc.aweme;end;',
                        scheme: 'snssdk1128://',
                        fallback: 'https://www.douyin.com'
                    },
                    meituan: {
                        universal: 'https://i.meituan.com',
                        intent: 'intent://#Intent;scheme=imeituan;package=com.sankuai.meituan;end;',
                        scheme: 'imeituan://',
                        fallback: 'https://www.meituan.com'
                    }
                }[platform];
                let launched = false;
                const cleanup = () => {
                    document.removeEventListener('visibilitychange', handler);
                    window.removeEventListener('blur', handler);
                };
                const handler = () => { launched = true; cleanup(); };
                document.addEventListener('visibilitychange', handler);
                window.addEventListener('blur', handler);
                if (isIOS) {
                    window.location.href = config.universal;
                } else if (isAndroid) {
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = config.intent;
                    document.body.appendChild(iframe);
                    setTimeout(() => {
                        iframe.remove();
                        if (!launched) window.location.href = config.fallback;
                    }, 2000);
                } else {
                    window.location.href = config.fallback;
                }
            }

            // ==================== 复制按钮事件绑定 ====================
            reviewsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                selectedReviewId = btn.getAttribute('data-id');
                modalOverlay.classList.add('show');
            });

            // 抖音
            chooseDouyin.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    copyTextToClipboard(review.text, async (success) => {
                        const deleted = await deleteReviewById(selectedReviewId);
                        if (deleted) {
                            const newReviews = await loadReviews();
                            currentReviews = newReviews;
                            renderReviews(currentReviews);
                            showToast('✅ 已复制，好评已使用', 2000);
                        } else {
                            showToast('⚠️ 复制成功，但删除失败，请重试', 3000);
                        }
                        modalOverlay.classList.remove('show');
                        jumpToApp('douyin');
                    });
                }
            });

            // 美团
            chooseMeituan.addEventListener('click', async () => {
                if (!selectedReviewId) { modalOverlay.classList.remove('show'); return; }
                const review = currentReviews.find(r => r.id === selectedReviewId);
                if (review) {
                    copyTextToClipboard(review.text, async (success) => {
                        const deleted = await deleteReviewById(selectedReviewId);
                        if (deleted) {
                            const newReviews = await loadReviews();
                            currentReviews = newReviews;
                            renderReviews(currentReviews);
                            showToast('✅ 已复制，好评已使用', 2000);
                        } else {
                            showToast('⚠️ 复制成功，但删除失败，请重试', 3000);
                        }
                        modalOverlay.classList.remove('show');
                        jumpToApp('meituan');
                    });
                }
            });

            closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('show'));
            modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('show'); });

            // 微信内引导
            if (isWeChat) {
                setTimeout(() => guideOverlay.classList.add('show'), 300);
                document.getElementById('guideConfirmBtn').addEventListener('click', () => guideOverlay.classList.remove('show'));
                guideOverlay.addEventListener('click', (e) => { if (e.target === guideOverlay) guideOverlay.classList.remove('show'); });
            }

            // ==================== 启动 ====================
            (async function init() {
                await initCloud();
                if (isCloudReady) {
                    await loadShopInfo();
                    await loadWifiInfo();
                    const reviews = await loadReviews();
                    currentReviews = reviews;
                    renderReviews(currentReviews);
                } else {
                    reviewsContainer.innerHTML = '<div class="review-card" style="color:#ff6b6b;">初始化失败，请检查网络</div>';
                }
            })();
        })();
    </script>
</body>
</html>
